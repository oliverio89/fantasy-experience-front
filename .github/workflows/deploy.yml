name: CI/CD — Fantasy Experience

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Full CI pipeline (type-check, lint, test, build)
  # ─────────────────────────────────────────────
  ci:
    name: Build & Test
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Create environment file
        run: |
          rm -f .env .env.local .env.production .env.production.local
          echo "VITE_PUBLIC_SUPABASE_URL=${{ secrets.VITE_PUBLIC_SUPABASE_URL }}" > .env
          echo "VITE_ANON_KEY=${{ secrets.VITE_ANON_KEY }}" >> .env

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────
  # Job 2: Deploy — only runs if CI passes
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: ci
    runs-on: self-hosted

    steps:
      - name: Deploy on VPS
        run: /opt/deploy/fantasyexperience.sh
